<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bassetti Web Rádio — Sistema de Comunicação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="relogio-container">
        <iframe 
            src="https://relogioonline.com.br/embed/horario/Santo_Andr%C3%A9-SP/#theme=0&ampm=0&showdate=1" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </header>

    <main class="player-wrapper">
        
        <section class="video-container" aria-label="Monitoramento da Câmera">
            <img id="cam-stream" src="" alt="Transmissão ao vivo da câmera em Santo André-SP">
            <div class="video-overlay">
                <h1 class="video-title">Câmera Ao Vivo — Santo André / SP</h1>
            </div>
        </section>

        <section class="status-panel" aria-live="polite">
            <span id="status-led" class="led led-inactive" role="status"></span>
            <span id="status-text">Aguardando inicialização do operador…</span>
        </section>

        <section class="control-console">
            <button id="btn-playback" class="btn-primary">▶️ Iniciar Transmissão</button>
            
            <div class="volume-control-box">
                <label for="slider-volume">Controle de Volume:</label>
                <div class="slider-wrapper">
                    <span class="volume-icon">🔈</span>
                    <input type="range" id="slider-volume" min="0" max="1" step="0.01" value="1" aria-label="Volume do Áudio">
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer-corporate">
        <div class="corporate-id">
            SERVIÇO REGIONAL DE COMUNICAÇÃO — CNAE: J-6010-1/00
        </div>
        <div class="social-channels">
            <a href="https://www.instagram.com/regionalfmabc" target="_blank" rel="noopener" title="Siga no Instagram" aria-label="Instagram">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5zm4.25 3a5.25 5.25 0 1 1 0 10.5a5.25 5.25 0 0 1 0-10.5zm0 1.5a3.75 3.75 0 1 0 0 7.5a3.75 3.75 0 0 0 0-7.5zm5.25-.88a1.12 1.12 0 1 1 0 2.25a1.12 1.12 0 0 1 0-2.25z"/>
                </svg>
            </a>
            <a href="https://www.facebook.com/regionalfmabc" target="_blank" rel="noopener" title="Curta no Facebook" aria-label="Facebook">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22 12.07C22 6.48 17.52 2 11.93 2S2 6.48 2 12.07c0 5.03 3.66 9.2 8.44 9.93v-7.03H7.9v-2.9h2.54V9.96c0-2.5 1.49-3.89 3.77-3.89c1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56v1.87h2.78l-.44 2.9h-2.34V22c4.78-.73 8.44-4.9 8.44-9.93z"/>
                </svg>
            </a>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
